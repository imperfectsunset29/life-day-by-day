<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <!-- Background vignette -->
    <radialGradient id="bgGrad" cx="0.50" cy="0.48" r="0.72" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3a0e3c"/>
      <stop offset="52%" stop-color="#2d0a2e"/>
      <stop offset="100%" stop-color="#140418"/>
    </radialGradient>

    <!-- Brain silhouette fill -->
    <radialGradient id="brainFill" cx="0.46" cy="0.45" r="0.62" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4e1c52"/>
      <stop offset="100%" stop-color="#280828"/>
    </radialGradient>

    <!-- Center glow: warm amber burst at the longitudinal fissure -->
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.5" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#d4902a" stop-opacity="0.78"/>
      <stop offset="45%" stop-color="#c8a87a" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#c8a87a" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner warm glow biased to left -->
    <radialGradient id="innerGlow" cx="0.38" cy="0.46" r="0.56" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c8a87a" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#b5c99a" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4a1a4d" stop-opacity="0"/>
    </radialGradient>

    <!-- Specular sheen: left hemisphere -->
    <linearGradient id="sheenGrad" x1="28" y1="24" x2="74" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0e8e0" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#f0e8e0" stop-opacity="0"/>
    </linearGradient>

    <!-- Left sulci: sage → ivory -->
    <linearGradient id="sulcusL" x1="12" y1="88" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b5c99a"/>
      <stop offset="60%" stop-color="#f0e8e0"/>
      <stop offset="100%" stop-color="#ddd0b4"/>
    </linearGradient>

    <!-- Left sulci warm: amber → ivory -->
    <linearGradient id="sulcusLW" x1="12" y1="88" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8a87a"/>
      <stop offset="60%" stop-color="#f0e8e0"/>
      <stop offset="100%" stop-color="#d4b888"/>
    </linearGradient>

    <!-- Right dissolving: ivory at center fades rightward -->
    <linearGradient id="dissolveR" x1="90" y1="88" x2="170" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0e8e0" stop-opacity="0.80"/>
      <stop offset="55%" stop-color="#b5c99a" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#b5c99a" stop-opacity="0"/>
    </linearGradient>

    <!-- Right outline: solid amber at center, fades rightward -->
    <linearGradient id="outlineRGrad" x1="90" y1="90" x2="170" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8a87a" stop-opacity="0.52"/>
      <stop offset="60%" stop-color="#c8a87a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8a87a" stop-opacity="0"/>
    </linearGradient>

    <!-- Escaping mark: fades as it exits -->
    <linearGradient id="escapeGrad" x1="108" y1="46" x2="180" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0e8e0" stop-opacity="0.82"/>
      <stop offset="50%" stop-color="#c8a87a" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#c8a87a" stop-opacity="0"/>
    </linearGradient>

    <!-- Ghost marks: very faint -->
    <linearGradient id="ghostGrad" x1="98" y1="72" x2="168" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b5c99a" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#b5c99a" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Layer 0: Background -->
  <rect width="180" height="180" fill="url(#bgGrad)"/>

  <!-- Background brainy texture: faint gyrus-like sweeps in the dark space -->
  <path d="M 0,54 C 10,38 24,26 42,22 C 56,18 66,24 68,38 C 70,50 58,62 42,64 C 26,64 10,54 0,54 Z"
    fill="none" stroke="#7a3080" stroke-width="3.5" opacity="0.12"/>
  <path d="M 2,28 C 16,16 34,10 52,10 C 64,10 74,16 76,28"
    fill="none" stroke="#7a3080" stroke-width="2.5" stroke-linecap="round" opacity="0.08"/>
  <path d="M 112,8 C 132,4 154,10 166,26 C 174,38 172,54 162,62 C 152,70 138,68 130,58"
    fill="none" stroke="#7a3080" stroke-width="3" opacity="0.11"/>
  <path d="M 154,2 C 166,10 174,22 176,38 C 178,50 172,62 162,66"
    fill="none" stroke="#7a3080" stroke-width="2" stroke-linecap="round" opacity="0.07"/>
  <path d="M 0,150 C 10,138 26,132 42,136 C 54,140 60,152 54,164 C 46,174 30,178 14,172"
    fill="none" stroke="#7a3080" stroke-width="3" opacity="0.11"/>
  <path d="M 138,168 C 152,158 166,156 176,164 C 180,170 178,180 168,180"
    fill="none" stroke="#7a3080" stroke-width="2.5" stroke-linecap="round" opacity="0.09"/>
  <path d="M 178,96 C 180,114 178,132 170,148 C 162,162 150,168 138,164"
    fill="none" stroke="#6a2060" stroke-width="3" stroke-linecap="round" opacity="0.10"/>
  <path d="M 2,106 C 0,124 2,142 10,156 C 18,168 30,174 44,170"
    fill="none" stroke="#6a2060" stroke-width="2.5" stroke-linecap="round" opacity="0.09"/>

  <!-- Brain silhouette — top-down view, LEFT side has bumpy gyral outline -->
  <path d="
    M 90,24
    C 80,10 60,6 48,14
    C 38,22 34,34 36,44
    C 34,50 28,60 22,70
    C 16,80 10,94 10,110
    C 10,126 18,142 30,154
    C 40,162 56,168 72,166
    C 80,164 86,160 89,154
    C 91,160 96,164 108,166
    C 124,168 140,162 152,152
    C 164,140 170,124 170,108
    C 170,92 164,78 156,68
    C 150,58 144,48 142,40
    C 140,28 130,14 114,10
    C 102,6 92,14 90,24 Z"
    fill="url(#brainFill)"/>

  <!-- Inner glow (left-biased amber warmth) -->
  <path d="
    M 90,36
    C 82,24 64,20 52,26
    C 42,32 36,44 38,56
    C 36,62 30,72 24,82
    C 18,92 14,106 14,120
    C 14,134 22,148 34,158
    C 44,164 58,168 74,166
    C 82,164 88,158 91,152
    C 94,158 100,164 112,166
    C 126,168 140,162 150,152
    C 160,140 166,126 166,112
    C 166,98 160,84 152,74
    C 146,64 140,54 138,46
    C 136,34 126,22 110,18
    C 100,14 92,22 90,36 Z"
    fill="url(#innerGlow)" opacity="0.80"/>

  <!-- Center longitudinal fissure glow — the signature amber warmth -->
  <ellipse cx="90" cy="91" rx="13" ry="44" fill="url(#centerGlow)" opacity="0.68"/>

  <!-- Specular sheen: left lobe only -->
  <path d="
    M 30,44
    C 42,28 64,24 78,34
    C 88,42 86,56 78,64
    C 70,72 50,72 36,66
    C 22,60 20,52 30,44 Z"
    fill="url(#sheenGrad)" opacity="0.58"/>

  <!-- ─── Outline: LEFT hemisphere (solid amber) ─── -->
  <path d="
    M 89,154
    C 86,160 80,164 72,166
    C 56,168 40,162 30,154
    C 18,142 10,126 10,110
    C 10,94 16,80 22,70
    C 28,60 34,50 36,44
    C 34,34 38,22 48,14
    C 60,6 80,10 90,24"
    fill="none" stroke="#c8a87a" stroke-width="1.8" stroke-opacity="0.50"
    stroke-linecap="round"/>

  <!-- ─── Outline: RIGHT hemisphere (fades out rightward) ─── -->
  <path d="
    M 90,24
    C 92,14 102,6 114,10
    C 130,14 140,28 142,40
    C 144,48 150,58 156,68
    C 164,78 170,92 170,108
    C 170,124 164,140 152,152
    C 140,162 124,168 108,166
    C 96,164 91,160 89,154"
    fill="none" stroke="url(#outlineRGrad)" stroke-width="1.8"
    stroke-linecap="round"/>

  <!-- ─── LEFT HEMISPHERE SULCI: bold, anatomical ─── -->

  <!-- Left central sulcus: arcs across upper-mid left lobe -->
  <path d="M 18,82 C 34,68 54,64 70,72 C 82,78 88,93 87,108"
    fill="none" stroke="url(#sulcusLW)" stroke-width="4.8"
    stroke-linecap="round" opacity="0.92"/>

  <!-- Left superior frontal sulcus: frontal area arc -->
  <path d="M 44,30 C 58,20 72,22 80,34 C 86,44 84,58 78,66"
    fill="none" stroke="url(#sulcusL)" stroke-width="4.0"
    stroke-linecap="round" opacity="0.88"/>

  <!-- Left postcentral / inferior parietal arc -->
  <path d="M 16,114 C 32,102 52,100 66,110 C 76,118 80,132 76,144"
    fill="none" stroke="url(#sulcusL)" stroke-width="3.8"
    stroke-linecap="round" opacity="0.84"/>

  <!-- ─── RIGHT HEMISPHERE: wabi-sabi, dissolving ─── -->

  <!-- Right central sulcus ghost: starts present, dissolves -->
  <path d="M 93,108 C 96,90 106,76 122,70 C 138,64 156,68 164,80"
    fill="none" stroke="url(#dissolveR)" stroke-width="4.6"
    stroke-linecap="round"/>

  <!-- Escaping stroke: sulcus that leaves the brain and fades to nothing -->
  <path d="M 108,46 C 126,34 148,32 162,42 C 170,50 176,62 180,72"
    fill="none" stroke="url(#escapeGrad)" stroke-width="3.8"
    stroke-linecap="round"/>

  <!-- Abstract ghost mark, lower right -->
  <path d="M 106,118 C 122,106 142,108 154,120 C 160,128 158,142 150,148"
    fill="none" stroke="url(#ghostGrad)" stroke-width="2.8"
    stroke-linecap="round"/>

  <!-- Barely-there fragment, upper right interior -->
  <path d="M 112,80 C 128,70 146,72 156,84"
    fill="none" stroke="url(#ghostGrad)" stroke-width="2.4"
    stroke-linecap="round" opacity="0.45"/>

</svg>
