<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <!-- Background: radial vignette, slightly off-center for wabi-sabi asymmetry -->
    <radialGradient id="bgGrad" cx="0.51" cy="0.47" r="0.70" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3d1040"/>
      <stop offset="55%" stop-color="#2d0a2e"/>
      <stop offset="100%" stop-color="#1a051b"/>
    </radialGradient>

    <!-- Brain silhouette: warm dark plum radial -->
    <radialGradient id="brainBaseGrad" cx="0.44" cy="0.40" r="0.65" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4a1a4d"/>
      <stop offset="100%" stop-color="#2a0a2c"/>
    </radialGradient>

    <!-- Inner glow: amber-gold center → sage mid → transparent edge -->
    <radialGradient id="innerGlowGrad" cx="0.50" cy="0.48" r="0.58" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c8a87a" stop-opacity="0.38"/>
      <stop offset="50%" stop-color="#b5c99a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#4a1a4d" stop-opacity="0"/>
    </radialGradient>

    <!-- Specular sheen: ivory lens highlight, upper area -->
    <linearGradient id="sheenGrad" x1="68" y1="32" x2="115" y2="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0e8e0" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#f0e8e0" stop-opacity="0"/>
    </linearGradient>

    <!-- Sulcus cool: sage → ivory → sage across canvas width -->
    <linearGradient id="sulcusGrad" x1="10" y1="90" x2="170" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b5c99a"/>
      <stop offset="50%" stop-color="#f0e8e0"/>
      <stop offset="100%" stop-color="#b5c99a"/>
    </linearGradient>

    <!-- Sulcus warm: amber → ivory → amber across canvas width -->
    <linearGradient id="sulcusGradWarm" x1="10" y1="90" x2="170" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c8a87a"/>
      <stop offset="50%" stop-color="#f0e8e0"/>
      <stop offset="100%" stop-color="#c8a87a"/>
    </linearGradient>
  </defs>

  <!-- Layer 0: Background -->
  <rect width="180" height="180" fill="url(#bgGrad)"/>

  <!-- Layer 1: Brain silhouette — front view, left lobe slightly larger/lower -->
  <path d="
    M 90,33
    C 81,18 62,11 46,18
    C 30,25 12,45 10,72
    C 8,99 16,131 30,150
    C 42,164 62,172 83,168
    C 87,166 89,159 90,155
    C 91,159 93,166 97,168
    C 118,172 138,164 150,150
    C 164,131 172,99 170,72
    C 168,45 150,25 134,18
    C 118,11 99,18 90,33 Z"
    fill="url(#brainBaseGrad)"/>

  <!-- Layer 2: Inner glow — same shape inset ~10px, shifted 3px right 2px down -->
  <path d="
    M 93,45
    C 86,33 70,27 56,33
    C 42,39 26,56 25,80
    C 24,104 32,132 46,148
    C 56,159 74,165 89,162
    C 92,161 93,155 95,152
    C 97,155 99,161 102,162
    C 117,165 135,159 145,148
    C 159,132 167,104 166,80
    C 165,56 149,39 135,33
    C 121,27 104,33 93,45 Z"
    fill="url(#innerGlowGrad)" opacity="0.75"/>

  <!-- Layer 3: Specular sheen — organic lens blob, upper-center -->
  <path d="
    M 68,40
    C 76,29 95,29 110,36
    C 120,41 122,52 116,59
    C 110,66 94,65 80,62
    C 68,59 61,50 68,40 Z"
    fill="url(#sheenGrad)" opacity="0.60"/>

  <!-- Layer 4: Sulci — 8 bold curved brain fold lines -->

  <!-- Central sulcus: sinuous S-curve dividing hemispheres -->
  <path d="M 88,38 C 83,56 98,70 90,90 C 82,110 91,124 88,142"
    fill="none" stroke="url(#sulcusGradWarm)" stroke-width="4.5"
    stroke-linecap="round" opacity="0.90"/>

  <!-- Left lateral (Sylvian) fissure: long arc across mid-left -->
  <path d="M 22,94 C 36,80 56,77 72,84 C 82,89 86,99 83,110"
    fill="none" stroke="url(#sulcusGrad)" stroke-width="5.0"
    stroke-linecap="round" opacity="0.87"/>

  <!-- Right lateral fissure: slightly shorter — wabi-sabi imperfection -->
  <path d="M 97,110 C 95,97 103,87 116,82 C 130,77 150,80 160,89"
    fill="none" stroke="url(#sulcusGrad)" stroke-width="4.5"
    stroke-linecap="round" opacity="0.85"/>

  <!-- Left superior frontal sulcus: arc across upper-left lobe -->
  <path d="M 28,62 C 40,48 60,44 74,52 C 80,57 82,66 78,74"
    fill="none" stroke="url(#sulcusGradWarm)" stroke-width="3.8"
    stroke-linecap="round" opacity="0.82"/>

  <!-- Left inferior frontal sulcus: parallel, slightly lower -->
  <path d="M 18,90 C 28,76 48,72 62,77 C 72,81 76,91 72,102"
    fill="none" stroke="url(#sulcusGrad)" stroke-width="3.5"
    stroke-linecap="round" opacity="0.80"/>

  <!-- Right postcentral sulcus: mirrors left superior frontal -->
  <path d="M 106,50 C 118,42 132,42 142,50 C 150,57 152,70 148,82"
    fill="none" stroke="url(#sulcusGradWarm)" stroke-width="4.0"
    stroke-linecap="round" opacity="0.85"/>

  <!-- Right intraparietal sulcus: shorter arc, upper-right -->
  <path d="M 120,68 C 132,61 146,63 154,74 C 158,82 156,93 150,99"
    fill="none" stroke="url(#sulcusGrad)" stroke-width="3.5"
    stroke-linecap="round" opacity="0.80"/>

  <!-- Left postcentral arc: lower-left lobe -->
  <path d="M 28,120 C 42,108 60,106 70,115 C 76,120 78,131 74,141"
    fill="none" stroke="url(#sulcusGrad)" stroke-width="3.8"
    stroke-linecap="round" opacity="0.78"/>

</svg>
